services:
  booking_back:
    container_name: booking_api
    build:
      context: .
    env_file:
      - .env
#    networks:
#      - booking_network
    ports:
      - "80:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - reports_data:/app/src/media/reports

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes # 5. Включение постоянного сохранения на диск
    healthcheck: # 6. Проверка здоровья контейнера
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
#    networks:
#      - booking_network

  celery_worker:
    build:
      context: .
    env_file:
      - .env
#    networks:
#      - booking_network
    command: celery -A src.tasks.celery_app:celery_instance worker --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - reports_data:/app/src/media/reports

  celery_beat:
    build:
      context: .
    env_file:
      - .env
#    networks:
#      - booking_network
    command: celery -A src.tasks.celery_app:celery_instance beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  reports_data:

